<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Просто дыши</title>

  <!-- Современный шрифт Manrope. Если интернета нет — подхватится системный (см. style.css) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <!-- PWA: «паспорт» приложения, цвет и иконка для домашнего экрана -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3f97cf">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Дыши">
</head>
<body>
  <!-- Экран 1: выбор ситуации -->
  <section id="screen-choice">
    <h1>Просто дыши</h1>
    <p id="choice-intro">Выбери, что сейчас происходит — подберём короткую технику.</p>

    <!-- Переключатель режима подачи -->
    <div class="mode-switch" role="group" aria-label="Режим">
      <button class="mode-btn" data-mode="adult">Взрослый</button>
      <button class="mode-btn" data-mode="child">Детский</button>
    </div>

    <!-- Экстренная кнопка: быстрая техника, когда нужно успокоиться прямо сейчас.
         data-adult / data-child — подписи под взрослый и детский режим (меняются из script.js) -->
    <button id="sos-button" class="sos"
            data-adult="🆘 SOS · быстро успокоиться"
            data-child="🆘 Мне совсем тяжело">🆘 SOS · быстро успокоиться</button>

    <div class="cards">
      <button class="card" data-id="trevoga" data-adult="Тревожно, волнуюсь" data-child="Боюсь, волнуюсь">Тревожно, волнуюсь</button>
      <button class="card" data-id="son" data-adult="Не могу уснуть" data-child="Не могу заснуть">Не могу уснуть</button>
      <button class="card" data-id="zlost" data-adult="Злюсь, раздражает" data-child="Я злюсь">Злюсь, раздражает</button>
      <button class="card" data-id="panika" data-adult="Накрывает паника" data-child="Мне очень страшно">Накрывает паника</button>
      <button class="card" data-id="grust" data-adult="Грустно, тяжело на душе" data-child="Мне грустно">Грустно, тяжело на душе</button>
      <button class="card" data-id="fokus" data-adult="Не могу сосредоточиться" data-child="Не могу усидеть на месте">Не могу сосредоточиться</button>
    </div>
  </section>

  <!-- Экран 2: техника (скрыт, заполняется из script.js) -->
  <section id="screen-technique" hidden>
    <button id="back-button" class="back">← Назад</button>
    <h1 id="tech-title"></h1>
    <p id="tech-instruction" class="instruction"></p>

    <!-- Зона дыхания: круг растёт/сжимается, а текст лежит поверх и не масштабируется -->
    <div class="breath-area">
      <div class="breath-stage">
        <div id="breath-circle" class="circle"></div>
        <div class="breath-text">
          <span id="phase-name" class="phase-name">Готовы?</span>
          <span id="phase-count" class="phase-count"></span>
        </div>
      </div>
      <div class="controls">
        <button id="start-button" class="primary">Начать</button>
      </div>
    </div>

    <!-- Звёздочки: видны в детском режиме. Копятся за каждый круг дыхания. -->
    <div id="stars-panel" class="stars-panel" hidden>
      <div class="stars-total">⭐ Звёздочек: <span id="stars-count">0</span></div>
      <div id="stars-praise" class="stars-praise"></div>
    </div>

    <!-- Пояснения к технике -->
    <div class="info-cards">
      <div id="tech-why-card" class="info-card">
        <span class="info-label">Почему помогает</span>
        <span id="tech-why"></span>
      </div>
      <div id="tech-basis-card" class="info-card">
        <span class="info-label">На чём основана</span>
        <span id="tech-basis"></span>
      </div>
    </div>
  </section>

  <footer class="disclaimer">
    Эти техники помогают успокоиться здесь и сейчас, но не заменяют помощь
    специалиста. Если тяжёлое состояние держится долго или повторяется —
    обратись к врачу или психологу.
  </footer>

  <script src="script.js"></script>
</body>
</html>
